<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romano Gold - Termékeink</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="../html/index.html">Kezdőlap</a></li>
            <li><a href="../html/termekek.html" class="active">Termékek</a></li>
            <li><a href="../html/tortenetunk.html">Történetünk</a></li>
        </ul>
    </nav>

    <div class="container">
        <header class="header">
            <div class="logo-placeholder">
                <img src="../kepek/logo.png" alt="Romano Gold Logo">

        </header>

        <main class="product-grid">
            <div class="product-item">
                <div class="image-box">
                    <img src="../kepek/termek1.png" alt="Ékszer">

            <div class="product-item">
                <div class="image-box">
                    <img src="../kepek/termek2.png" alt="Ékszer">

            <div class="product-item">
                <div class="image-box">
                    <img src="../kepek/termek6.png" alt="Ékszer">
